version: '3.8'

services:
  db:
    image: postgres:17
    container_name: areal-hr-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: areal_hr
    ports:
      - "5433:5432"  # <-- ИЗМЕНИЛИ ЗДЕСЬ (внешний порт 5433)
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: